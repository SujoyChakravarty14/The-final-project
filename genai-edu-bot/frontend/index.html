<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <title>AI Donor Response Trainer</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🤖 AI Donor Response Trainer</h1>

    <!-- Question -->
    <div class="card">
        <h3>📩 Donor Email</h3>
        <p id="question">Loading...</p>
        <button id="nextBtn">Next Question</button>
    </div>

    <!-- Answer -->
    <div class="card">
        <h3>✍️ Your Response</h3>
        <textarea id="answer" rows="5" placeholder="Write your response..."></textarea>
        <button id="submitBtn">Submit</button>
    </div>

    <!-- Evaluation -->
    <div class="card">
        <h3>📊 Evaluation</h3>
        <div id="result">No evaluation yet</div>
    </div>

    <!-- History -->
    <div class="card">
        <h3>📜 History</h3>
        <div id="history">No history yet</div>
    </div>

</div>

<!-- Link JS -->
<script src="script.js"></script>


</body>
</html>
